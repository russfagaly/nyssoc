<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Members — The New York State Society of the Cincinnati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..600&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="members" data-screen-label="Members Login">

<div id="site-header"></div>

<main>

  <section class="section" style="padding-top: 96px; padding-bottom: 40px;">
    <div class="container center">
      <p class="kicker">Members Only</p>
      <h1 style="font-size: 40px;">The Members Area</h1>
      <p class="lede" style="margin: 16px auto 0; max-width: 44ch;">Meeting notices, rosters, and Society documents for members of the New York State Society.</p>
    </div>
  </section>

  <section class="section-tight" style="padding-bottom: 96px;">
    <div class="container">
      <form class="login-card" onsubmit="return false;">
        <label for="member-user">Username</label>
        <input id="member-user" type="text" autocomplete="username">
        <label for="member-pass">Password</label>
        <input id="member-pass" type="password" autocomplete="current-password">
        <button class="btn btn-primary" type="submit" style="width: 100%; justify-content: center; margin-top: 26px;">Sign in</button>
        <p class="note" style="margin-top: 22px;">Forgotten credentials? Write to <a href="mailto:Info@nycincinnati.org">Info@nycincinnati.org</a>.</p>
      </form>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="site.js"></script>

</body>
</html>
